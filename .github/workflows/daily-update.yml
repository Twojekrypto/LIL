name: Daily LIL Data Update

on:
  schedule:
    # Every day at 08:00 UTC (10:00 CET)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch on-chain data (incremental)
        run: node scripts/fetch_onchain.js

      - name: Update index.html + history.json
        run: node scripts/update_html.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily: auto-update LIL data $(date +%Y-%m-%d)"
            git push
          fi

  # ── Bi-weekly: refresh holder balances + circulation stats ──
  refresh-holders:
    runs-on: ubuntu-latest
    needs: update-data
    timeout-minutes: 10

    steps:
      - name: Check if bi-weekly run day
        id: check
        run: |
          DAY=$(date -u +%d)
          if [ "$DAY" = "01" ] || [ "$DAY" = "15" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            echo "✅ Bi-weekly run: day=$DAY, event=${{ github.event_name }}"
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "⏭ Skipping holder refresh: day=$DAY (runs on 1st/15th)"
          fi

      - name: Checkout
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (after daily update)
        if: steps.check.outputs.run == 'true'
        run: git pull origin main

      - name: Setup Node.js
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.run == 'true'
        run: npm ci

      - name: Refresh holder balances
        if: steps.check.outputs.run == 'true'
        run: node scripts/fetch_holders.js

      - name: Commit & Push
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "bi-weekly: refresh holder balances $(date +%Y-%m-%d)"
            git push
          fi
