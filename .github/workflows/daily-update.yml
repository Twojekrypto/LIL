name: Daily LIL Data Update

on:
  schedule:
    # Every day at 08:00 UTC (10:00 CET)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch on-chain data (incremental)
        run: node scripts/fetch_onchain.js

      - name: Update index.html + history.json
        run: node scripts/update_html.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily: auto-update LIL data $(date +%Y-%m-%d)"
            git push
          fi

  # ── Daily: refresh holder balances + circulation stats ──
  refresh-holders:
    runs-on: ubuntu-latest
    needs: update-data
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (after daily update)
        run: git pull origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refresh holder balances
        run: node scripts/fetch_holders.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily: refresh holder balances $(date +%Y-%m-%d)"
            git push
          fi
